<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 绩点盲盒抽奖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }
        header h1 { font-size: 32px; margin-bottom: 10px; }
        header p { opacity: 0.9; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        /* 登录 */
        .login-form input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }
        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        
        /* 用户信息 */
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .user-name { font-size: 20px; font-weight: bold; }
        .logout-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        
        /* 余额展示 */
        .balance-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            color: white;
        }
        .balance-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .balance-value {
            font-size: 48px;
            font-weight: bold;
        }
        .balance-unit {
            font-size: 16px;
            opacity: 0.8;
        }
        
        /* 新手礼包按钮 */
        .newbie-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(243, 156, 18, 0.4);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .newbie-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(243, 156, 18, 0.6);
        }
        .newbie-btn::before {
            content: '✨';
            position: absolute;
            left: 20px;
            font-size: 24px;
        }
        .newbie-btn::after {
            content: '🎁';
            position: absolute;
            right: 20px;
            font-size: 24px;
        }
        
        /* 新手礼包弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalPop 0.3s ease-out;
        }
        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .modal-subtitle {
            color: #666;
            font-size: 14px;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .close-btn:hover { color: #333; }
        
        /* 新手盲盒 */
        .newbie-boxes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .newbie-box {
            aspect-ratio: 1;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: 3px solid rgba(255,255,255,0.3);
            position: relative;
        }
        .newbie-box:hover {
            transform: translateY(-5px) scale(1.05);
        }
        .newbie-box.opened {
            cursor: default;
            opacity: 0.7;
        }
        .newbie-box.opened .box-icon {
            animation: none;
        }
        .newbie-box1 {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
        .newbie-box2 {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }
        .newbie-box3 {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }
        .box-icon {
            font-size: 40px;
            margin-bottom: 8px;
            animation: bounce 1s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .box-label {
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .box-prize {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            display: none;
        }
        .newbie-box.opened .box-icon,
        .newbie-box.opened .box-label {
            display: none;
        }
        .newbie-box.opened .box-prize {
            display: block;
        }
        
        /* 礼包结果 */
        .gift-result {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }
        .gift-result.show {
            display: block;
            animation: pop 0.5s ease-out;
        }
        .gift-total {
            font-size: 36px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 10px;
        }
        .gift-text {
            color: #666;
        }
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            text-align: center;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-value.success { color: #27ae60; }
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        /* 盲盒 */
        .blindbox-container {
            text-align: center;
            padding: 20px;
        }
        .blindbox {
            width: 180px;
            height: 220px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }
        .blindbox:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }
        .blindbox.shaking {
            animation: shake 0.5s ease-in-out infinite;
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .blindbox-icon { font-size: 60px; margin-bottom: 10px; }
        .blindbox-text {
            color: white;
            font-weight: bold;
        }
        
        /* 结果 */
        .result {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }
        .result.show {
            display: block;
            animation: pop 0.5s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-gpa {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b6b;
        }
        .result-text {
            color: #666;
            margin-top: 10px;
        }
        
        /* 概率表 */
        .prob-table {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            font-size: 12px;
        }
        .prob-item {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
        }
        .prob-gpa { font-weight: bold; color: #333; }
        .prob-rate { color: #999; font-size: 10px; }
        
        /* 历史记录 */
        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .history-gpa {
            font-weight: bold;
            color: #ff6b6b;
        }
        .history-time {
            font-size: 12px;
            color: #999;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎁 绩点盲盒抽奖</h1>
            <p>点击盲盒，随机抽取 1-20 绩点</p>
        </header>
        
        <!-- 登录 -->
        <div id="loginCard" class="card">
            <h3 style="text-align: center; margin-bottom: 20px;">请输入精网号</h3>
            <div class="login-form">
                <input type="text" id="userId" placeholder="例如: 90012345">
                <button class="btn" onclick="login()">进入抽奖</button>
            </div>
        </div>
        
        <!-- 用户信息 -->
        <div id="userCard" class="card hidden">
            <div class="user-info">
                <div>
                    <div class="user-name" id="userName">--</div>
                    <div style="color: #999; font-size: 14px;">ID: <span id="userIdDisplay">--</span></div>
                </div>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
            
            <!-- 余额展示 -->
            <div class="balance-display">
                <div class="balance-label">💰 当前绩点余额</div>
                <div class="balance-value" id="balanceValue">0</div>
                <div class="balance-unit">绩点</div>
            </div>
            
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value success" id="statDrawn">0</div>
                    <div class="stat-label">累计获得</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statCount" style="color: #9b59b6;">0</div>
                    <div class="stat-label">抽奖次数</div>
                </div>
            </div>
        </div>
        
        <!-- 盲盒 -->
        <div id="drawCard" class="card hidden">
            <div class="blindbox-container">
                <div class="blindbox" id="blindbox" onclick="draw()">
                    <div class="blindbox-icon">🎁</div>
                    <div class="blindbox-text">点击抽奖</div>
                </div>
            </div>
            <div id="result" class="result">
                <div class="result-gpa">+<span id="resultGpa">0</span> 绩点</div>
                <div class="result-text">恭喜获得 <span id="resultText">0</span> 绩点！</div>
            </div>
        </div>
        
        <!-- 新手礼包按钮 -->
        <button id="newbieBtn" class="newbie-btn hidden" onclick="openNewbieModal()">
            欢迎新会员加入绩点系统，新手礼包已备好
        </button>
        
        <!-- 提示信息 -->
        <div id="tipCard" class="card hidden">
            <div style="text-align: center; color: #666; padding: 15px;">
                <div style="font-size: 28px; margin-bottom: 10px;">✨</div>
                <div style="font-size: 16px; margin-bottom: 5px; font-weight: bold;">每次抽奖都会获得不同数量的绩点</div>
                <div style="font-size: 14px; color: #999;">运气越好，获得的绩点越多！</div>
            </div>
        </div>
        
        <!-- 新手礼包弹窗 -->
        <div id="newbieModal" class="modal-overlay" onclick="closeNewbieModal(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="close-btn" onclick="closeNewbieModal()">&times;</div>
                <div class="modal-header">
                    <div class="modal-title">🎁 新手大礼包</div>
                    <div class="modal-subtitle">欢迎新会员！点击盲盒领取你的专属礼包</div>
                </div>
                <div class="newbie-boxes">
                    <div class="newbie-box newbie-box1" onclick="openNewbieBox(0)">
                        <div class="box-icon">🎁</div>
                        <div class="box-label">福气包</div>
                        <div class="box-prize"></div>
                    </div>
                    <div class="newbie-box newbie-box2" onclick="openNewbieBox(1)">
                        <div class="box-icon">🧧</div>
                        <div class="box-label">财运包</div>
                        <div class="box-prize"></div>
                    </div>
                    <div class="newbie-box newbie-box3" onclick="openNewbieBox(2)">
                        <div class="box-icon">💎</div>
                        <div class="box-label">幸运包</div>
                        <div class="box-prize"></div>
                    </div>
                </div>
                <div id="giftResult" class="gift-result">
                    <div class="gift-total">+<span id="giftTotal">0</span> 绩点</div>
                    <div class="gift-text">恭喜获得新手礼包！快去抽奖吧～</div>
                </div>
            </div>
        </div>
        
        <!-- 历史记录 -->
        <div id="historyCard" class="card hidden">
            <h3 style="text-align: center; margin-bottom: 15px;">📜 抽奖记录</h3>
            <div class="history-list" id="historyList">
                <div style="text-align: center; color: #999;">暂无记录</div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        
        // 登录 - 只输入ID，从Excel匹配
        async function login() {
            const userId = document.getElementById('userId').value.trim();
            if (!userId) {
                alert('请输入精网号');
                return;
            }
            
            try {
                // 从服务器获取用户（服务器会从Excel匹配）
                let res = await fetch(`/api/users/${userId}`);
                
                if (!res.ok) {
                    alert('未找到该用户，请检查精网号是否正确');
                    return;
                }
                
                const user = await res.json();
                
                currentUser = user;
                localStorage.setItem('blindboxUserId', userId);
                showMain();
                loadHistory();
            } catch (err) {
                console.error('登录失败:', err);
                alert('登录失败，请重试');
            }
        }
        
        // 显示主界面
        function showMain() {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('userCard').classList.remove('hidden');
            document.getElementById('drawCard').classList.remove('hidden');
            document.getElementById('tipCard').classList.remove('hidden');
            document.getElementById('historyCard').classList.remove('hidden');
            document.getElementById('newbieBtn').classList.remove('hidden');
            
            updateDisplay();
        }
        
        // 新手礼包配置（吉利数字）
        const NEWBIE_GIFTS = [
            { name: '福气包', values: [6, 8, 16, 18, 28, 38, 58, 66, 68, 88] },
            { name: '财运包', values: [8, 18, 28, 38, 48, 58, 68, 78, 88, 98] },
            { name: '幸运包', values: [16, 26, 36, 46, 56, 66, 76, 86, 96, 100] }
        ];
        let openedBoxes = [false, false, false];
        let totalGiftGpa = 0;
        
        // 打开新手礼包弹窗
        function openNewbieModal() {
            document.getElementById('newbieModal').classList.add('show');
            // 重置状态
            openedBoxes = [false, false, false];
            totalGiftGpa = 0;
            document.getElementById('giftResult').classList.remove('show');
            
            // 重置盲盒显示
            const boxes = document.querySelectorAll('.newbie-box');
            boxes.forEach((box, index) => {
                box.classList.remove('opened');
                box.querySelector('.box-prize').textContent = '';
            });
        }
        
        // 关闭新手礼包弹窗
        function closeNewbieModal(event) {
            if (!event || event.target.id === 'newbieModal') {
                document.getElementById('newbieModal').classList.remove('show');
            }
        }
        
        // 打开新手盲盒
        async function openNewbieBox(index) {
            if (openedBoxes[index]) return;
            
            openedBoxes[index] = true;
            
            // 随机选择一个吉利数字
            const values = NEWBIE_GIFTS[index].values;
            const prize = values[Math.floor(Math.random() * values.length)];
            
            totalGiftGpa += prize;
            
            // 显示奖品
            const box = document.querySelectorAll('.newbie-box')[index];
            box.classList.add('opened');
            box.querySelector('.box-prize').textContent = '+' + prize;
            
            // 如果三个都开了，显示总计
            if (openedBoxes.every(v => v)) {
                document.getElementById('giftTotal').textContent = totalGiftGpa;
                document.getElementById('giftResult').classList.add('show');
                
                // 添加到用户绩点（调用API）
                try {
                    await fetch('/api/newbie-gift', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            userId: currentUser.id, 
                            gpa: totalGiftGpa 
                        })
                    });
                    
                    // 更新显示
                    currentUser.drawnGpa = (currentUser.drawnGpa || 0) + totalGiftGpa;
                    updateDisplay();
                } catch (err) {
                    console.error('领取礼包失败:', err);
                }
            }
        }
        
        // 更新显示
        function updateDisplay() {
            if (!currentUser) return;
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userIdDisplay').textContent = currentUser.id;
            
            // 计算余额 = 初始绩点 + 已抽取绩点
            const balance = (currentUser.gpa || 0) + (currentUser.drawnGpa || 0);
            document.getElementById('balanceValue').textContent = balance;
            
            document.getElementById('statDrawn').textContent = currentUser.drawnGpa || 0;
            document.getElementById('statCount').textContent = currentUser.drawCount || 0;
        }
        
        // 抽奖
        async function draw() {
            if (!currentUser) return;
            
            const box = document.getElementById('blindbox');
            const result = document.getElementById('result');
            
            result.classList.remove('show');
            box.classList.add('shaking');
            box.style.pointerEvents = 'none';
            
            try {
                const res = await fetch('/api/draw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id })
                });
                
                const data = await res.json();
                
                setTimeout(() => {
                    box.classList.remove('shaking');
                    box.style.pointerEvents = 'auto';
                    
                    if (data.success) {
                        document.getElementById('resultGpa').textContent = data.prize;
                        document.getElementById('resultText').textContent = data.prize;
                        result.classList.add('show');
                        
                        // 更新用户数据
                        currentUser.drawnGpa = data.user.drawnGpa;
                        currentUser.drawCount = data.user.drawCount;
                        
                        // 更新显示 - 使用返回的余额
                        document.getElementById('balanceValue').textContent = data.balance;
                        document.getElementById('statDrawn').textContent = data.user.drawnGpa || 0;
                        document.getElementById('statCount').textContent = data.user.drawCount || 0;
                        
                        addHistory(data.prize);
                    }
                }, 1500);
            } catch (err) {
                box.classList.remove('shaking');
                box.style.pointerEvents = 'auto';
                alert('抽奖失败');
            }
        }
        
        // 添加历史记录
        function addHistory(gpa) {
            const list = document.getElementById('historyList');
            const time = new Date().toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <span class="history-gpa">+${gpa} 绩点</span>
                <span class="history-time">${time}</span>
            `;
            
            if (list.children[0]?.textContent === '暂无记录') {
                list.innerHTML = '';
            }
            
            list.insertBefore(item, list.firstChild);
        }
        
        // 加载历史
        async function loadHistory() {
            if (!currentUser) return;
            
            try {
                const res = await fetch(`/api/history/${currentUser.id}`);
                const history = await res.json();
                
                const list = document.getElementById('historyList');
                if (history.length === 0) {
                    list.innerHTML = '<div style="text-align: center; color: #999;">暂无记录</div>';
                    return;
                }
                
                list.innerHTML = history.map(h => `
                    <div class="history-item">
                        <span class="history-gpa">+${h.prizeGpa} 绩点</span>
                        <span class="history-time">${new Date(h.timestamp).toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error('加载历史失败:', err);
            }
        }
        
        // 退出
        function logout() {
            localStorage.removeItem('blindboxUserId');
            currentUser = null;
            location.reload();
        }
        
        // 自动登录
        async function autoLogin() {
            const savedId = localStorage.getItem('blindboxUserId');
            if (!savedId) return;
            
            try {
                const res = await fetch(`/api/users/${savedId}`);
                if (res.ok) {
                    currentUser = await res.json();
                    showMain();
                    loadHistory();
                }
            } catch (err) {
                console.error('自动登录失败:', err);
            }
        }
        
        // 监听回车
        document.getElementById('userId')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        // 页面加载
        autoLogin();
    </script>
</body>
</html>
